name: Release CI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: celsius-fahrenheit-convertor-linux
            asset_name: celsius-fahrenheit-convertor-x86_64-unknown-linux-gnu
          - os: windows-latest
            artifact_name: celsius-fahrenheit-convertor.exe
            asset_name: celsius-fahrenheit-convertor-x86_64-pc-windows-msvc.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release
        run: cargo build --release --locked

      - name: Prepare Artifacts
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv target/release/celsius-fahrenheit-convertor.exe ${{ matrix.artifact_name }}
          else
            mv target/release/celsius-fahrenheit-convertor ${{ matrix.artifact_name }}
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            celsius-fahrenheit-convertor-*
          generate_release_notes: true